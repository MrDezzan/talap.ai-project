version: '3.8'

services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: talap_db
    environment:
      POSTGRES_USER: talap_user
      POSTGRES_PASSWORD: talap_password
      POSTGRES_DB: talap_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - talap_network

  # Backend (Go)
  backend:
    build: 
      context: ./backend
    container_name: talap_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: talap_user
      DB_PASS: talap_password
      DB_NAME: talap_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORS_ALLOWED_ORIGINS: "*" # Adjust this in production to your domain
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-me}
      PORT: 8080
    depends_on:
      - db
    networks:
      - talap_network

  # Frontend (React + Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Pass the backend URL (from outside Docker, or use proxy)
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    container_name: talap_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - talap_network

volumes:
  postgres_data:

networks:
  talap_network:
    driver: bridge
